document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"c8cf9f18-d471-4273-9857-dd3745990c8e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n\n\n<style>\n:root {\n  --bg: #07090d;\n  --bg-2: #0b0f17;\n  --ink: #f2f4f8;\n  --ink-dim: #8a93a3;\n  --ink-faint: #424b59;\n  --line: rgba(255,255,255,0.06);\n  --line-2: rgba(255,255,255,0.12);\n  --line-3: rgba(255,255,255,0.18);\n  --cyan: #7fe9ff;\n  --amber: #f5b95d;\n  --glass: rgba(255,255,255,0.025);\n  --card-bg: rgba(12,16,24,0.55);\n\n  --display: 'Fraunces', 'Times New Roman', serif;\n  --sans: 'Inter Tight', 'Helvetica Neue', system-ui, sans-serif;\n  --mono: 'JetBrains Mono', ui-monospace, monospace;\n\n  --ease: cubic-bezier(0.22, 1, 0.36, 1);\n\n  --content-max: 560px;\n  --section-vpad: 160px;\n}\n\n* { margin: 0; padding: 0; box-sizing: border-box; }\n\nhtml, body {\n  background: var(--bg);\n  color: var(--ink);\n  font-family: var(--sans);\n  font-weight: 300;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  overflow-x: hidden;\n  text-rendering: optimizeLegibility;\n}\n\nbody {\n  background:\n    radial-gradient(ellipse 80% 55% at 50% -8%, rgba(127,233,255,0.05), transparent 55%),\n    radial-gradient(ellipse 60% 45% at 50% 108%, rgba(245,185,93,0.03), transparent 55%),\n    var(--bg);\n  background-attachment: fixed;\n}\n\n/* subtle grid texture */\nbody::before {\n  content: '';\n  position: fixed;\n  inset: 0;\n  pointer-events: none;\n  z-index: 1;\n  background-image:\n    linear-gradient(to right, rgba(255,255,255,0.018) 1px, transparent 1px),\n    linear-gradient(to bottom, rgba(255,255,255,0.018) 1px, transparent 1px);\n  background-size: 80px 80px;\n  mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 80%);\n  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 80%);\n}\n\n/* film grain */\nbody::after {\n  content: '';\n  position: fixed; inset: 0;\n  pointer-events: none;\n  z-index: 200;\n  background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/%3E%3C/svg%3E\");\n  opacity: 0.035;\n  mix-blend-mode: overlay;\n}\n\n/* ============== NAV ============== */\n.nav {\n  position: fixed; top: 22px; left: 50%;\n  transform: translateX(-50%);\n  z-index: 100;\n  display: flex; align-items: center; gap: 2px;\n  padding: 7px 7px 7px 22px;\n  background: rgba(10,14,21,0.7);\n  backdrop-filter: blur(28px) saturate(180%);\n  -webkit-backdrop-filter: blur(28px) saturate(180%);\n  border: 1px solid var(--line-2);\n  border-radius: 100px;\n  font-family: var(--sans);\n  font-size: 13px;\n  font-weight: 400;\n  letter-spacing: -0.005em;\n  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);\n}\n\n.nav-mark {\n  font-family: var(--display);\n  font-style: italic;\n  font-weight: 400;\n  font-size: 17px;\n  color: var(--ink);\n  padding-right: 16px;\n  border-right: 1px solid var(--line-2);\n  margin-right: 4px;\n  letter-spacing: -0.01em;\n}\n\n.nav-mark::before {\n  content: '';\n  display: inline-block;\n  width: 6px; height: 6px;\n  border-radius: 50%;\n  background: var(--cyan);\n  box-shadow: 0 0 8px var(--cyan);\n  margin-right: 8px;\n  vertical-align: middle;\n  animation: livePulse 2.4s ease-in-out infinite;\n}\n\n.nav a {\n  color: var(--ink-dim);\n  text-decoration: none;\n  padding: 9px 14px;\n  border-radius: 100px;\n  transition: all 0.35s var(--ease);\n  white-space: nowrap;\n}\n\n.nav a:hover { color: var(--ink); background: rgba(255,255,255,0.05); }\n.nav .cta {\n  color: var(--bg);\n  background: var(--ink);\n  padding: 9px 18px;\n  font-weight: 500;\n}\n.nav .cta:hover { background: var(--cyan); color: var(--bg); }\n\n/* ============== 3D STAGE ============== */\n#stage {\n  position: fixed; inset: 0;\n  z-index: 1;\n  pointer-events: none;\n}\n\n#stage canvas { width: 100% !important; height: 100% !important; display: block; }\n\n/* Soft mask gradients that protect the text side */\n.stage-mask {\n  position: fixed; inset: 0;\n  z-index: 2;\n  pointer-events: none;\n  opacity: 0;\n  transition: opacity 1s var(--ease);\n}\n\n.stage-mask.left {\n  /* dims the LEFT half so right-side 3D pops, but a soft mid-fade keeps it natural */\n  background: linear-gradient(90deg, var(--bg) 0%, rgba(6,8,12,0.85) 25%, transparent 60%);\n}\n\n.stage-mask.right {\n  background: linear-gradient(270deg, var(--bg) 0%, rgba(6,8,12,0.85) 25%, transparent 60%);\n}\n\n.stage-mask.center {\n  background: radial-gradient(ellipse 60% 40% at 50% 50%, transparent 0%, rgba(6,8,12,0.6) 80%);\n}\n\n/* progress rail */\n.progress {\n  position: fixed; right: 36px; top: 50%;\n  transform: translateY(-50%);\n  z-index: 90;\n  display: flex; flex-direction: column; gap: 16px;\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.18em;\n  color: var(--ink-faint);\n}\n\n.progress-item {\n  display: flex; align-items: center; gap: 10px;\n  cursor: pointer;\n  transition: color 0.4s var(--ease);\n}\n\n.progress-item:hover { color: var(--ink); }\n\n.progress-item .dot {\n  width: 6px; height: 6px;\n  border-radius: 50%;\n  background: var(--ink-faint);\n  transition: all 0.5s var(--ease);\n}\n\n.progress-item.active { color: var(--ink); }\n.progress-item.active .dot {\n  background: var(--cyan);\n  box-shadow: 0 0 12px var(--cyan);\n  transform: scale(1.5);\n}\n\n.progress-item .label {\n  opacity: 0;\n  transform: translateX(8px);\n  transition: all 0.4s var(--ease);\n}\n\n.progress-item:hover .label,\n.progress-item.active .label {\n  opacity: 1;\n  transform: translateX(0);\n}\n\n/* ============== SECTIONS ============== */\nmain { position: relative; z-index: 3; }\n\nsection {\n  min-height: 100vh;\n  padding: var(--section-vpad) 6vw;\n  position: relative;\n  display: flex;\n  flex-direction: column;\n  justify-content: center;\n}\n\n/* hairline divider above each section title (visual rhythm) */\nsection + section .section-content::before {\n  content: '';\n  display: block;\n  width: 60px;\n  height: 1px;\n  background: linear-gradient(90deg, var(--line-3), transparent);\n  margin-bottom: 36px;\n}\n\n/* SAFE ZONES — content always sits on one half, 3D on the other.\n   The grid columns enforce a no-overlap layout. */\n.section-grid {\n  display: grid;\n  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);\n  gap: 80px;\n  align-items: center;\n  width: 100%;\n  max-width: 1400px;\n  margin: 0 auto;\n}\n\n.section-grid.right .section-content { grid-column: 2; }\n.section-grid.right .section-spacer { grid-column: 1; grid-row: 1; }\n\n.section-content {\n  max-width: var(--content-max);\n  position: relative;\n  z-index: 5;\n  /* subtle backdrop so text sits cleanly even if a particle drifts */\n  padding: 8px 0;\n}\n\n.section-eyebrow {\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.24em;\n  color: var(--cyan);\n  text-transform: uppercase;\n  margin-bottom: 32px;\n  display: flex; align-items: center; gap: 12px;\n  font-weight: 400;\n}\n\n.section-eyebrow::before {\n  content: '';\n  width: 28px; height: 1px;\n  background: var(--cyan);\n  opacity: 0.7;\n}\n\n.section-title {\n  font-family: var(--display);\n  font-size: clamp(2.6rem, 5.4vw, 4.6rem);\n  font-weight: 300;\n  line-height: 1.0;\n  letter-spacing: -0.04em;\n  margin-bottom: 28px;\n  text-wrap: pretty;\n}\n\n.section-title em {\n  font-style: italic;\n  font-weight: 400;\n  color: var(--cyan);\n}\n\n.section-title em.amber { color: var(--amber); }\n\n.section-text {\n  font-family: var(--sans);\n  font-size: 1.05rem;\n  line-height: 1.65;\n  color: var(--ink-dim);\n  font-weight: 300;\n  letter-spacing: -0.005em;\n  margin-bottom: 36px;\n  text-wrap: pretty;\n  max-width: 48ch;\n}\n\n.section-text strong { color: var(--ink); font-weight: 500; }\n\n/* ============== HERO ============== */\n.hero {\n  text-align: center;\n  align-items: center;\n  padding-top: 140px;\n  min-height: 100vh;\n}\n\n.hero-content {\n  position: relative;\n  z-index: 5;\n  max-width: 920px;\n}\n\n.hero-meta {\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.22em;\n  color: var(--ink-dim);\n  text-transform: uppercase;\n  margin-bottom: 36px;\n  display: flex; align-items: center; gap: 14px;\n  justify-content: center;\n}\n\n.hero-meta .live {\n  width: 6px; height: 6px;\n  border-radius: 50%;\n  background: var(--cyan);\n  box-shadow: 0 0 10px var(--cyan);\n  animation: livePulse 2.4s ease-in-out infinite;\n}\n\n@keyframes livePulse {\n  0%, 100% { opacity: 1; }\n  50% { opacity: 0.4; }\n}\n\n.hero-name {\n  font-family: var(--display);\n  font-size: clamp(4rem, 13vw, 10.5rem);\n  font-weight: 200;\n  line-height: 0.9;\n  letter-spacing: -0.055em;\n  margin-bottom: 36px;\n  background: linear-gradient(180deg, var(--ink) 0%, rgba(242,244,248,0.85) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  -webkit-text-fill-color: transparent;\n}\n\n.hero-name .last {\n  font-style: italic;\n  font-weight: 300;\n}\n\n.hero-sub {\n  font-family: var(--mono);\n  font-size: clamp(0.85rem, 1.1vw, 0.95rem);\n  letter-spacing: 0.04em;\n  color: var(--ink-dim);\n  margin-bottom: 8px;\n  line-height: 1.7;\n}\n\n.hero-sub .sep { color: var(--cyan); margin: 0 12px; }\n.hero-sub .amber { color: var(--amber); }\n\n.hero-tagline {\n  font-family: var(--display);\n  font-style: italic;\n  font-size: clamp(1.25rem, 2.1vw, 1.7rem);\n  font-weight: 300;\n  color: var(--ink);\n  max-width: 640px;\n  margin: 40px auto 56px;\n  line-height: 1.45;\n  letter-spacing: -0.012em;\n  text-wrap: pretty;\n}\n\n.hero-tagline::before {\n  content: '';\n  display: block;\n  width: 1px;\n  height: 28px;\n  background: linear-gradient(to bottom, transparent, var(--line-3), transparent);\n  margin: 0 auto 28px;\n}\n\n.hero-cta {\n  display: flex; gap: 12px;\n  justify-content: center;\n}\n\n.btn {\n  font-family: var(--sans);\n  font-size: 13px;\n  font-weight: 500;\n  letter-spacing: -0.005em;\n  padding: 15px 26px;\n  border-radius: 100px;\n  border: 1px solid var(--line-2);\n  background: var(--glass);\n  backdrop-filter: blur(12px);\n  color: var(--ink);\n  text-decoration: none;\n  display: inline-flex; align-items: center; gap: 10px;\n  transition: all 0.45s var(--ease);\n  cursor: pointer;\n}\n\n.btn:hover { border-color: var(--line-3); background: rgba(255,255,255,0.06); transform: translateY(-2px); }\n.btn-primary {\n  background: var(--ink);\n  color: var(--bg);\n  border-color: var(--ink);\n  box-shadow: 0 4px 24px rgba(127,233,255,0.0);\n}\n.btn-primary:hover {\n  background: var(--cyan);\n  border-color: var(--cyan);\n  box-shadow: 0 8px 32px rgba(127,233,255,0.25);\n}\n.btn .arrow { transition: transform 0.4s var(--ease); }\n.btn:hover .arrow { transform: translateX(3px); }\n\n.hero-scrollhint {\n  position: absolute;\n  bottom: 50px; left: 50%;\n  transform: translateX(-50%);\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.25em;\n  color: var(--ink-faint);\n  text-transform: uppercase;\n  display: flex; flex-direction: column;\n  align-items: center; gap: 14px;\n}\n\n.hero-scrollhint .ln {\n  width: 1px; height: 36px;\n  background: linear-gradient(to bottom, var(--ink-faint), transparent);\n  position: relative; overflow: hidden;\n}\n\n.hero-scrollhint .ln::after {\n  content: '';\n  position: absolute; inset: 0;\n  background: linear-gradient(to bottom, var(--cyan), transparent);\n  animation: scrollLine 2.8s ease-in-out infinite;\n}\n\n@keyframes scrollLine {\n  0% { transform: translateY(-100%); }\n  100% { transform: translateY(100%); }\n}\n\n/* ============== LANGUAGES ============== */\n.lang-list {\n  display: flex; flex-direction: column;\n  border-top: 1px solid var(--line-2);\n}\n\n.lang-row {\n  display: grid;\n  grid-template-columns: 70px 1fr auto;\n  gap: 24px; align-items: baseline;\n  padding: 26px 0;\n  border-bottom: 1px solid var(--line);\n  transition: all 0.6s var(--ease);\n  position: relative;\n}\n\n.lang-row::after {\n  content: '';\n  position: absolute;\n  left: 0; bottom: -1px;\n  width: 0; height: 1px;\n  background: var(--cyan);\n  transition: width 0.6s var(--ease);\n}\n\n.lang-row:hover { padding-left: 14px; }\n.lang-row:hover::after { width: 40px; }\n\n.lang-num {\n  font-family: var(--mono);\n  font-size: 10px;\n  color: var(--ink-faint);\n  letter-spacing: 0.2em;\n}\n\n.lang-name {\n  font-family: var(--display);\n  font-size: 2.1rem;\n  font-weight: 300;\n  letter-spacing: -0.025em;\n}\n\n.lang-name em {\n  font-family: var(--sans);\n  font-style: normal;\n  color: var(--ink-faint);\n  font-size: 0.7rem;\n  margin-left: 14px;\n  text-transform: uppercase;\n  letter-spacing: 0.18em;\n  font-weight: 400;\n  vertical-align: middle;\n}\n\n.lang-level {\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.2em;\n  color: var(--cyan);\n  text-transform: uppercase;\n}\n\n.lang-row:nth-child(2) .lang-level { color: var(--amber); }\n\n.lang-foot {\n  margin-top: 32px;\n  font-family: var(--display);\n  font-style: italic;\n  font-size: 1.05rem;\n  color: var(--ink-dim);\n  max-width: 520px;\n  line-height: 1.55;\n  padding-left: 18px;\n  border-left: 1px solid var(--line-2);\n}\n\n/* ============== EXPERIENCE / CARDS ============== */\n.exp-card {\n  background: var(--card-bg);\n  backdrop-filter: blur(28px) saturate(140%);\n  -webkit-backdrop-filter: blur(28px) saturate(140%);\n  border: 1px solid var(--line-2);\n  border-radius: 24px;\n  padding: 44px;\n  position: relative;\n  overflow: hidden;\n  box-shadow:\n    0 1px 0 rgba(255,255,255,0.04) inset,\n    0 24px 60px -20px rgba(0,0,0,0.5);\n}\n\n.exp-card::before {\n  content: '';\n  position: absolute; top: 0; left: 20%; right: 20%;\n  height: 1px;\n  background: linear-gradient(90deg, transparent, rgba(127,233,255,0.4), transparent);\n}\n\n.exp-card.amber-style::before {\n  background: linear-gradient(90deg, transparent, rgba(245,185,93,0.4), transparent);\n}\n\n.exp-tag {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.2em;\n  padding: 7px 14px;\n  border-radius: 100px;\n  margin-bottom: 28px;\n  text-transform: uppercase;\n  font-weight: 400;\n}\n\n.exp-tag::before {\n  content: '';\n  width: 5px; height: 5px;\n  border-radius: 50%;\n  background: currentColor;\n  box-shadow: 0 0 6px currentColor;\n}\n\n.exp-tag.cyan {\n  color: var(--cyan);\n  border: 1px solid rgba(127,233,255,0.25);\n  background: rgba(127,233,255,0.04);\n}\n\n.exp-tag.amber {\n  color: var(--amber);\n  border: 1px solid rgba(245,185,93,0.25);\n  background: rgba(245,185,93,0.04);\n}\n\n.exp-meta {\n  display: flex; justify-content: space-between;\n  align-items: baseline;\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.18em;\n  color: var(--ink-dim);\n  text-transform: uppercase;\n  margin-bottom: 18px;\n  padding-bottom: 18px;\n  border-bottom: 1px dashed var(--line-2);\n}\n\n.exp-meta .role { color: var(--cyan); }\n.exp-card.amber-style .exp-meta .role { color: var(--amber); }\n\n.exp-title {\n  font-family: var(--display);\n  font-size: clamp(1.9rem, 3.4vw, 2.6rem);\n  font-weight: 300;\n  letter-spacing: -0.032em;\n  line-height: 1.08;\n  margin-bottom: 20px;\n  text-wrap: pretty;\n}\n\n.exp-title em { font-style: italic; color: var(--cyan); }\n.exp-card.amber-style .exp-title em { color: var(--amber); }\n\n.exp-desc {\n  font-family: var(--sans);\n  font-size: 0.98rem;\n  color: var(--ink-dim);\n  line-height: 1.65;\n  margin-bottom: 28px;\n  text-wrap: pretty;\n}\n\n.exp-bullets {\n  list-style: none;\n  margin-top: 8px;\n  border-top: 1px solid var(--line);\n}\n\n.exp-bullets li {\n  font-family: var(--display);\n  font-size: 0.96rem;\n  color: var(--ink);\n  padding: 14px 0 14px 32px;\n  border-bottom: 1px solid var(--line);\n  position: relative;\n  font-weight: 300;\n  letter-spacing: -0.005em;\n}\n\n.exp-bullets li::before {\n  content: '';\n  position: absolute; left: 0; top: 22px;\n  width: 16px; height: 1px;\n  background: var(--cyan);\n}\n\n.exp-card.amber-style .exp-bullets li::before { background: var(--amber); }\n\n.exp-link {\n  display: inline-flex; align-items: center; gap: 10px;\n  margin-top: 28px;\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.12em;\n  color: var(--ink);\n  text-decoration: none;\n  padding: 11px 18px;\n  border: 1px solid var(--line-2);\n  border-radius: 100px;\n  transition: all 0.4s var(--ease);\n  text-transform: uppercase;\n}\n\n.exp-link:hover { background: rgba(127,233,255,0.05); border-color: var(--cyan); color: var(--cyan); }\n.exp-card.amber-style .exp-link:hover { background: rgba(245,185,93,0.05); border-color: var(--amber); color: var(--amber); }\n\n/* ============== PROJECTS ============== */\n.proj-stack {\n  display: flex; flex-direction: column;\n  gap: 32px;\n}\n\n.proj-card {\n  background: var(--card-bg);\n  backdrop-filter: blur(24px) saturate(140%);\n  border: 1px solid var(--line-2);\n  border-radius: 22px;\n  padding: 36px;\n  position: relative;\n  overflow: hidden;\n  transition: all 0.5s var(--ease);\n  box-shadow:\n    0 1px 0 rgba(255,255,255,0.03) inset,\n    0 16px 40px -16px rgba(0,0,0,0.4);\n}\n\n.proj-card:hover {\n  border-color: var(--line-3);\n  transform: translateY(-2px);\n}\n\n.proj-card::before {\n  content: '';\n  position: absolute; top: 0; left: 24px; right: 24px;\n  height: 1px;\n  background: linear-gradient(90deg, transparent, rgba(127,233,255,0.3), transparent);\n}\n\n.proj-card.amber-style::before {\n  background: linear-gradient(90deg, transparent, rgba(245,185,93,0.3), transparent);\n}\n\n.proj-head {\n  display: flex; justify-content: space-between;\n  align-items: baseline;\n  margin-bottom: 18px;\n}\n\n.proj-num {\n  font-family: var(--mono);\n  font-size: 11px;\n  color: var(--cyan);\n  letter-spacing: 0.18em;\n}\n\n.proj-card.amber-style .proj-num { color: var(--amber); }\n\n.proj-tag {\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.15em;\n  color: var(--ink-faint);\n  text-transform: uppercase;\n}\n\n.proj-title {\n  font-family: var(--display);\n  font-size: clamp(1.7rem, 3vw, 2.4rem);\n  font-weight: 300;\n  letter-spacing: -0.025em;\n  line-height: 1.05;\n  margin-bottom: 14px;\n}\n\n.proj-title em { font-style: italic; color: var(--cyan); }\n.proj-card.amber-style .proj-title em { color: var(--amber); }\n\n.proj-desc {\n  font-size: 0.98rem;\n  color: var(--ink-dim);\n  line-height: 1.55;\n  margin-bottom: 22px;\n}\n\n.proj-bullets {\n  list-style: none;\n  margin-bottom: 22px;\n  border-top: 1px solid var(--line);\n}\n\n.proj-bullets li {\n  font-family: var(--display);\n  font-size: 0.94rem;\n  color: var(--ink);\n  padding: 11px 0 11px 28px;\n  border-bottom: 1px solid var(--line);\n  position: relative;\n  font-weight: 300;\n}\n\n.proj-bullets li::before {\n  content: '';\n  position: absolute; left: 0; top: 18px;\n  width: 14px; height: 1px;\n  background: var(--cyan);\n  opacity: 0.7;\n}\n\n.proj-card.amber-style .proj-bullets li::before { background: var(--amber); }\n\n.proj-foot {\n  display: flex; justify-content: space-between;\n  align-items: center; gap: 16px;\n  flex-wrap: wrap;\n}\n\n.proj-tech {\n  display: flex; flex-wrap: wrap; gap: 6px;\n}\n\n.chip {\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.06em;\n  padding: 6px 12px;\n  border-radius: 6px;\n  background: rgba(255,255,255,0.03);\n  border: 1px solid var(--line-2);\n  color: var(--ink-dim);\n  transition: all 0.3s var(--ease);\n}\n\n.chip:hover {\n  border-color: var(--line-3);\n  color: var(--ink);\n  background: rgba(255,255,255,0.05);\n}\n\n/* ============== SKILLS ============== */\n.skills-cols {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 28px;\n}\n\n.skill-col {\n  border-top: 1px solid var(--line-2);\n  padding-top: 22px;\n  position: relative;\n}\n\n.skill-col::before {\n  content: '';\n  position: absolute;\n  top: -1px; left: 0;\n  width: 24px; height: 1px;\n  background: var(--cyan);\n}\n\n.skill-col:nth-child(2)::before { background: var(--amber); }\n.skill-col:nth-child(3)::before { background: var(--ink); }\n\n.skill-col-label {\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.22em;\n  color: var(--ink-dim);\n  text-transform: uppercase;\n  margin-bottom: 24px;\n  font-weight: 400;\n}\n\n.skill-col ul { list-style: none; }\n\n.skill-col li {\n  font-family: var(--display);\n  font-size: 1.25rem;\n  font-weight: 300;\n  letter-spacing: -0.015em;\n  padding: 10px 0;\n  color: var(--ink);\n  transition: all 0.4s var(--ease);\n  border-bottom: 1px solid transparent;\n}\n\n.skill-col li:hover {\n  color: var(--cyan);\n  transform: translateX(6px);\n}\n\n.skill-col li em {\n  font-style: italic;\n  color: var(--ink-dim);\n  font-size: 0.85rem;\n  display: block;\n  margin-top: 2px;\n}\n\n/* ============== CAPABILITIES ============== */\n.cap-grid {\n  display: grid;\n  grid-template-columns: repeat(2, 1fr);\n  gap: 1px;\n  background: var(--line-2);\n  border: 1px solid var(--line-2);\n  border-radius: 20px;\n  overflow: hidden;\n}\n\n.cap-item {\n  padding: 32px 28px;\n  background: rgba(11,15,23,0.6);\n  backdrop-filter: blur(12px);\n  position: relative;\n  transition: background 0.5s var(--ease);\n  min-height: 140px;\n}\n\n.cap-item:hover { background: rgba(20,26,38,0.7); }\n\n.cap-num {\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.22em;\n  color: var(--cyan);\n  margin-bottom: 16px;\n  font-weight: 400;\n}\n\n.cap-text {\n  font-family: var(--display       <span class=\"role\">Solo · Networking &amp; Game Logic<\u002Fspan>\n          <span>Liars Bar Online<\u002Fspan>\n        <\u002Fdiv>\n        <h2 class=\"exp-title\">A bluffing game, <em>distributed across the network.<\u002Fem><\u002Fh2>\n        <p class=\"exp-desc\">\n          A multiplayer adaptation of Liar's Bar built as a hands-on study in distributed systems — client-server architecture, real-time state synchronization, and the messy reality of keeping multiple players in agreement about a shared game world.\n        <\u002Fp>\n        <ul class=\"exp-bullets\">\n          <li>Client-server communication and protocol design<\u002Fli>\n          <li>Real-time game state synchronization across clients<\u002Fli>\n          <li>Online multiplayer turn logic, rounds, and bluffs<\u002Fli>\n          <li>Built as a deliberate distributed-systems exercise<\u002Fli>\n        <\u002Ful>\n        <a href=\"https://github.com/Shuai678/liars-bar-online\" target=\"_blank\" rel=\"noopener\" class=\"exp-link\">\n          <span>View on GitHub<\u002Fspan><span>↗<\u002Fspan>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section-spacer\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 5 — PROJECTS — content LEFT, 3D RIGHT -->\n<section id=\"projects\" data-step=\"5\" data-zone=\"right\">\n  <div class=\"section-grid\">\n    <div class=\"section-content fade-up\">\n      <div class=\"section-eyebrow\">06 · Selected Work<\u002Fdiv>\n      <h2 class=\"section-title\">Systems-level <em>side projects.<\u002Fem><\u002Fh2>\n\n      <div class=\"proj-stack\">\n        <article class=\"proj-card\">\n          <div class=\"proj-head\">\n            <span class=\"proj-num\">P · 01<\u002Fspan>\n            <span class=\"proj-tag\">Industrial · CLI<\u002Fspan>\n          <\u002Fdiv>\n          <h3 class=\"proj-title\">C++ Monitoring &amp; <em>Calibration System<\u002Fem><\u002Fh3>\n          <p class=\"proj-desc\">A CLI application that tracks calibration cycles — clean separation between data ingestion, validation, and reporting.<\u002Fp>\n          <ul class=\"proj-bullets\">\n            <li>JSON &amp; CSV data processing pipelines<\u002Fli>\n            <li>File system monitoring and event handling<\u002Fli>\n            <li>Modular CLI architecture, structured software design<\u002Fli>\n          <\u002Ful>\n          <div class=\"proj-foot\">\n            <div class=\"proj-tech\">\n              <span class=\"chip\">C++<\u002Fspan>\n              <span class=\"chip\">JSON<\u002Fspan>\n              <span class=\"chip\">CSV<\u002Fspan>\n              <span class=\"chip\">CLI<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Farticle>\n\n        <article class=\"proj-card amber-style\">\n          <div class=\"proj-head\">\n            <span class=\"proj-num\">P · 02<\u002Fspan>\n            <span class=\"proj-tag\">Concurrency · Threads<\u002Fspan>\n          <\u002Fdiv>\n          <h3 class=\"proj-title\">Multithreading <em>Battle System<\u002Fem><\u002Fh3>\n          <p class=\"proj-desc\">A concurrent player-vs-player simulation coordinated through semaphores — synchronization, race conditions, and deadlock prevention.<\u002Fp>\n          <ul class=\"proj-bullets\">\n            <li>Thread synchronization using Semaphore primitives<\u002Fli>\n            <li>Concurrent battle logic with shared state<\u002Fli>\n            <li>Race-condition-safe state model<\u002Fli>\n          <\u002Ful>\n          <div class=\"proj-foot\">\n            <div class=\"proj-tech\">\n              <span class=\"chip\">C#<\u002Fspan>\n              <span class=\"chip\">Semaphore<\u002Fspan>\n              <span class=\"chip\">Threads<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section-spacer\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 6 — SKILLS — content RIGHT, 3D LEFT -->\n<section id=\"skills\ n          <div class=\"cap-text\">Build <em>real-time<\u002Fem> and distributed applications<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cap-item\">\n          <div class=\"cap-num\">CAP · 02<\u002Fdiv>\n          <div class=\"cap-text\">Work across <em>C#, C++, Go,<\u002Fem> and JavaScript<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cap-item\">\n          <div class=\"cap-num\">CAP · 03<\u002Fdiv>\n          <div class=\"cap-text\">Design <em>structured<\u002Fem> software systems<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cap-item\">\n          <div class=\"cap-num\">CAP · 04<\u002Fdiv>\n          <div class=\"cap-text\">Data files, CLI tools, <em>monitoring<\u002Fem> workflows<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cap-item\">\n          <div class=\"cap-num\">CAP · 05<\u002Fdiv>\n          <div class=\"cap-text\">Collaborate in <em>multilingual<\u002Fem> international teams<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cap-item\">\n          <div class=\"cap-num\">CAP · 06<\u002Fdiv>\n          <div class=\"cap-text\">Translate ideas into <em>shipped<\u002Fem> working code<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section-spacer\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 8 — FUTURE — content RIGHT, 3D LEFT -->\n<section id=\"future\" data-step=\"8\" data-zone=\"left\">\n  <div class=\"section-grid right\">\n    <div class=\"section-content fade-up\" style=\"max-width: 620px;\">\n      <div class=\"section-eyebrow\">09 · What's Next<\u002Fdiv>\n      <h2 class=\"section-title\">Where I'm <em class=\"amber\">heading next.<\u002Fem><\u002Fh2>\n\n      <div class=\"goals-list\">\n        <div class=\"goal-card\">\n          <div class=\"goal-num\">GOAL · 01<\u002Fdiv>\n          <div class=\"goal-text\">Study <em>Computer Engineering<\u002Fem> or Artificial Intelligence at university<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"goal-card\">\n          <div class=\"goal-num\">GOAL · 02<\u002Fdiv>\n          <div class=\"goal-text\">Build real-world <em>AI and distributed<\u002Fem> systems that ship to users<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"goal-card\">\n          <div class=\"goal-num\">GOAL · 03<\u002Fdiv>\n          <div class=\"goal-text\">Sharpen <em>system-level<\u002Fem> programming and software architecture<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section-spacer\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 9 — CONTACT -->\n<section class=\"contact\" id=\"contact\" data-step=\"9\" data-zone=\"center\">\n  <div class=\"contact-content\">\n    <div class=\"contact-pretitle fade-up\">10 · Get in touch<\u002Fdiv>\n    <h2 class=\"contact-title fade-up\">Let's <em>build<\u002Fem> something.<\u002Fh2>\n    <p class=\"contact-sub fade-up\">\n      Open to internships, collaborations, and quiet conversations about systems, networks, and AI.\n    <\u002Fp>\n    <div class=\"contact-links fade-up\">\n      <a href=\"https://github.com/Shuai678\" target=\"_blank\" rel=\"noopener\" class=\"btn\">GitHub <span class=\"arrow\">↗<\u002Fspan><\u002Fa>\n      <a href=\"mailto:nicolo.shuai@example.com\" class=\"btn btn-primary\">Email <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n      <a href=\"https://linkedin.com/\" target=\"_blank\" rel=\"noopener\" class=\"btn\">LinkedIn <span class=\"arrow\">↗<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer class=\"footer\">\n  <span><span class=\"accent\">Nicolò Shuai<\u002Fspan> · Portfolio 2026<\u002Fspan>\n  <span>Built with C# · C++ · Go · Curiosity<\u002Fspan>\n<\u002Ffooter>\n\n<\u002Fmain>\n\n<script src=\"4bd6af21-ca90-42cd-86c8-d878f7a5d1f9\"><\u002Fscript>\n<script src=\"7aee3d1e-e74d-4aa1-82a5-2fee3da36cff\"><\u002Fscript>\n<script src=\"e2aaa52f-1e38-47e3-933f-8679eb219a24\"><\u002Fscript>\n\n<script>\ngsap.registerPlugin(ScrollTrigger);\n\n// ============================================================\n// DEVICE / PERFORMANCE FLAGS\n// ============================================================\nconst IS_MOBILE = window.matchMedia('(max-width: 900px)').matches;\nconst IS_REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\nconst PARTICLE_FACTOR = IS_MOBILE ? 0.4 : 1;\n\n// ============================================================\n// THREE.JS SETUP — single scene, lightweight, no shadows\n// ============================================================\nconst stageEl = document.getElementById('stage');\n\nconst scene = new THREE.Scene();\nscene.fog = new THREE.FogExp2(0x06080c, 0.022);\n\nconst camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 200);\ncamera.position.set(0, 0, 10);\n\nconst renderer = new THREE.WebGLRenderer({\n  antialias: !IS_MOBILE,\n  alpha: true,\n  powerPreference: 'high-performance'\n});\nrenderer.setPixelRatio(Math.min(devicePixelRatio, IS_MOBILE ? 1.5 : 2));\nrenderer.setSize(innerWidth, innerHeight);\nrenderer.setClearColor(0x000000, 0);\nstageEl.appendChild(renderer.domElement);\n\n// Lights — kept minimal, no shadows\nscene.add(new THREE.AmbientLight(0xffffff, 0.45));\nconst keyL = new THREE.DirectionalLight(0x66e5ff, 1.0); keyL.position.set(5, 5, 6); scene.add(keyL);\nconst fillL = new THREE.DirectionalLight(0xffb547, 0.6); fillL.position.set(-6, -3, 4); scene.add(fillL);\n\n// ============================================================\n// GLOBAL SMOOTH STATE — single source of truth\n// All scroll input feeds into these \"target\" values; the render loop\n// lerps the actual values toward them every frame for smooth motion.\n// ============================================================\nconst M = {\n  // mouse (smooth)\n  mxT: 0, myT: 0,\n  mx: 0, my: 0,\n  // camera offset target/actual (driven by scrub timeline)\n  camXT: 0, camYT: 0,\n  camX: 0, camY: 0,\n  // scene group offset (which side of screen the 3D sits on)\n  // -1 = full left, 0 = center, +1 = full right\n  zoneT: 0,\n  zone: 0,\n  // global scene scale damping when text appears\n  scaleT: 1,\n  scale: 1,\n};\n\n// Mouse with damped target\nwindow.addEventListener('mousemove', (e) => {\n  M.mxT = (e.clientX / innerWidth - 0.5) * 2;\n  M.myT = (e.clientY / innerHeight - 0.5) * 2;\n}, { passive: true });\n\n// Lerp helper\nconst lerp = (a, b, t) => a + (b - a) * t;\n\n// ============================================================\n// SHARED ATMOSPHERE — light particle field, kept far back\n// ============================================================\nconst ambientPCount = Math.floor(400 * PARTICLE_FACTOR);\nconst ambientPGeo = new THREE.BufferGeometry();\nconst apPos = new Float32Array(ambientPCount * 3);\nfor (let i = 0; i < ambientPCount; i++) {\n  const r = 18 + Math.random() * 22;\n  const theta = Math.random() * Math.PI * 2;\n  const phi = Math.acos(2 * Math.random() - 1);\n  apPos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);\n  apPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);\n  apPos[i * 3 + 2] = r * Math.cos(phi) - 8;\n}\nambientPGeo.setAttribute('position', new THREE.BufferAttribute(apPos, 3));\nconst ambientPMat = new THREE.PointsMaterial({\n  color: 0xffffff,\n  size: 0.018,\n  transparent: true,\n  opacity: 0.32,\n  blending: THREE.AdditiveBlending,\n  depthWrite: false,\n});\nconst ambientParticles = new THREE.Points(ambientPGeo, ambientPMat);\nscene.add(ambientParticles);\n\n// ============================================================\n// SCENE OPACITY HELPERS\n// We tag each material's base opacity so we can fade groups uniformly.\n// ============================================================\nfunction tagOpacity(mat, base) {\n  mat.userData.baseOpacity = base;\n  mat.transparent = true;\n  mat.opacity = 0;\n  return mat;\n}\n\nfunction setGroupOpacity(group, op) {\n  group.traverse(o => {\n    if (o.material) {\n      const apply = (m) => {\n        if (m.userData && m.userData.baseOpacity !== undefined) {\n          m.opacity = m.userData.baseOpacity * op;\n        }\n      };\n      if (Array.isArray(o.material)) o.material.forEach(apply);\n      else apply(o.material);\n    }\n  });\n}\n\n// ============================================================\n// SCENE BUILDERS — each returns { group, update(t) }\n// All scenes are designed to fit comfortably in roughly a\n// 4-unit radius bubble so they never leak into the text zone.\n// ============================================================\n\n/* ---------- 0 · HERO — Identity Core ---------- */\nfunction buildHero() {\n  const g = new THREE.Group();\n\n  const core = new THREE.Mesh(\n    new THREE.IcosahedronGeometry(1.4, 1),\n    tagOpacity(new THREE.MeshPhysicalMaterial({\n      color: 0xffffff, metalness: 0.2, roughness: 0.08,\n      transmission: 0.85, thickness: 1.2, ior: 1.45,\n      clearcoat: 1, clearcoatRoughness: 0.05,\n    }), 0.95)\n  );\n  g.add(core);\n\n  const wire = new THREE.LineSegments(\n    new THREE.WireframeGeometry(new THREE.IcosahedronGeometry(1.42, 1)),\n    tagOpacity(new THREE.LineBasicMaterial({ color: 0x66e5ff }), 0.45)\n  );\n  g.add(wire);\n\n  const innerCore = new THREE.Mesh(\n    new THREE.IcosahedronGeometry(0.5, 0),\n    tagOpacity(new THREE.MeshBasicMaterial({ color: 0x66e5ff }), 0.65)\n  );\n  g.add(innerCore);\n\n  // 3 floating identity cards (was 4) — less crowded\n  const cards = new THREE.Group();\n  for (let i = 0; i < 3; i++) {\n    const card = new THREE.Mesh(\n      new THREE.PlaneGeometry(0.85, 0.5),\n      tagOpacity(new THREE.MeshPhysicalMaterial({\n        color: 0xffffff, transmission: 0.5, thickness: 0.2,\n        roughness: 0.3, side: THREE.DoubleSide,\n      }), 0.16)\n    );\n    const angle = (i / 3) * Math.PI * 2;\n    card.userData = { angle, r: 2.7, phase: Math.random() * Math.PI * 2 };\n    cards.add(card);\n\n    const edge = new THREE.LineSegments(\n      new THREE.EdgesGeometry(card.geometry),\n      tagOpacity(new THREE.LineBasicMaterial({ color: 0x66e5ff }), 0.28)\n    );\n    card.add(edge);\n  }\n  g.add(cards);\n\n  // Smoothed inertia for hero rotation\n  const inertia = { rotY: 0, rotYT: 0 };\n\n  return {\n    group: g,\n    update: (t, dt) => {\n      // Slow, calm rotation with inertia-style damping\n      inertia.rotYT = t * 0.12;\n      inertia.rotY = lerp(inertia.rotY, inertia.rotYT, 0.04);\n      g.rotation.y = inertia.rotY;\n      g.rotation.x = Math.sin(t * 0.3) * 0.04;\n\n      innerCore.scale.setScalar(0.9 + Math.sin(t * 1.2) * 0.1);\n\n      cards.children.forEach((c) => {\n        const a = c.userData.angle + t * 0.12;\n        c.position.x = Math.cos(a) * c.userData.r;\n        c.position.z = Math.sin(a) * c.userData.r - 0.5;\n        c.position.y = Math.sin(t * 0.5 + c.userData.phase) * 0.3;\n        c.lookAt(0, 0, 0);\n      });\n    }\n  };\n}\n\n/* ---------- 1 · LANGUAGES — orbiting badge plates ---------- */\nfunction buildLanguages() {\n  const g = new THREE.Group();\n\n  const spine = new THREE.Mesh(\n    new THREE.IcosahedronGeometry(0.6, 0),\n    tagOpacity(new THREE.MeshPhysicalMaterial({\n      color: 0xffffff, transmission: 0.8, thickness: 0.8, roughness: 0.1, ior: 1.4,\n    }), 0.85)\n  );\n  g.add(spine);\n\n  const spineWire = new THREE.LineSegments(\n    new THREE.WireframeGeometry(new THREE.IcosahedronGeometry(0.62, 0)),\n    tagOpacity(new THREE.LineBasicMaterial({ color: 0x66e5ff }), 0.45)\n  );\n  g.add(spineWire);\n\n  const langs = [\n    { glyph: '中文', sub: 'NATIVE', color: '#66e5ff' },\n    { glyph: 'IT',   sub: 'NATIVE', color: '#ffb547' },\n    { glyph: 'EN',   sub: 'B2',     color: '#eef1f5' },\n  ];\n\n  const badges = new THREE.Group();\n  langs.forEach((lng, i) => {\n    const cv = document.createElement('canvas');\n    cv.width = 256; cv.height = 256;\n    const cx = cv.getContext('2d');\n    cx.fillStyle = 'rgba(10,14,21,0.85)';\n    cx.fillRect(0, 0, 256, 256);\n    cx.strokeStyle = lng.color;\n    cx.lineWidth = 3;\n    cx.strokeRect(8, 8, 240, 240);\n    cx.fillStyle = lng.color;\n    cx.textAlign = 'center';\n    cx.textBaseline = 'middle';\n    cx.font = '700 110px \"JetBrains Mono\", monospace';\n    cx.fillText(lng.glyph, 128, 120);\n    cx.font = '500 22px \"JetBrains Mono\", monospace';\n    cx.fillStyle = '#8590a0';\n    cx.fillText(lng.sub, 128, 200);\n    cx.strokeStyle = lng.color;\n    cx.lineWidth = 2;\n    [[24,24],[232,24],[24,232],[232,232]].forEach(([x,y]) => {\n      cx.beginPath(); cx.moveTo(x-8,y); cx.lineTo(x+8,y); cx.moveTo(x,y-8); cx.lineTo(x,y+8); cx.stroke();\n    });\n\n    const tex = new THREE.CanvasTexture(cv);\n    tex.anisotropy = 8;\n    const badge = new THREE.Mesh(\n      new THREE.PlaneGeometry(1.4, 1.4),\n      tagOpacity(new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide }), 1.0)\n    );\n    badge.userData.angle = (i / langs.length) * Math.PI * 2;\n    badges.add(badge);\n  });\n  g.add(badges);\n\n  const orbitRing = new THREE.Mesh(\n    new THREE.TorusGeometry(2.4, 0.006, 16, 160),\n    tagOpacity(new THREE.MeshBasicMaterial({ color: 0x66e5ff }), 0.35)\n  );\n  orbitRing.rotation.x = Math.PI / 2;\n  g.add(orbitRing);\n\n  return {\n    group: g,\n    update: (t) => {\n      g.rotation.y = t * 0.05;\n      spine.rotation.y = -t * 0.25;\n      spine.rotation.x = t * 0.12;\n      badges.children.forEach((b, i) => {\n        const a = b.userData.angle + t * 0.18;  // slowed\n        b.position.x = Math.cos(a) * 2.4;\n        b.position.z = Math.sin(a) * 2.4;\n        b.position.y = Math.sin(t * 0.4 + i * 1.5) * 0.18;\n        b.lookAt(camera.position);\n      });\n    }\n  };\n}\n\n/* ---------- 2 · W&H — Industrial dashboard ---------- */\nfunction buildIndustrial() {\n  const g = new THREE.Group();\n\n  const cyl = new THREE.Mesh(\n    new THREE.CylinderGeometry(0.28, 0.28, 1.8, 24, 1, true),\n    tagOpacity(new THREE.MeshPhysicalMaterial({\n      color: 0xffffff, transmission: 0.6, thickness: 0.5, roughness: 0.2, side: THREE.DoubleSide,\n    }), 0.35)\n  );\n  g.add(cyl);\n\n  const gauges = new THREE.Group();\n  for (let i = 0; i < 4; i++) {  // was 5\n    const ring = new THREE.Mesh(\n      new THREE.TorusGeometry(0.45 + i * 0.12, 0.01, 12, 80),\n      tagOpacity(new THREE.MeshBasicMaterial({ color: 0x66e5ff }), 0.5 - i * 0.06)\n    );\n    ring.position.y = i * 0.42 - 0.63;\n    ring.rotation.x = Math.PI / 2;\n    ring.userData.baseY = ring.position.y;\n    gauges.add(ring);\n  }\n  g.add(gauges);\n\n  const panels = new THREE.Group();\n  const panelLabels = ['CALIB.json', 'log_2026.csv', 'PROCESS_03'];  // was 4\n  panelLabels.forEach((label, i) => {\n    const cv = document.createElement('canvas');\n    cv.width = 384; cv.height = 128;\n    const cx = cv.getContext('2d');\n    cx.fillStyle = 'rgba(10,14,21,0.9)';\n    cx.fillRect(0, 0, 384, 128);\n    cx.strokeStyle = '#66e5ff';\n    cx.lineWidth = 1.5;\n    cx.strokeRect(4, 4, 376, 120);\n    cx.fillStyle = 'rgba(102,229,255,0.15)';\n    cx.fillRect(4, 4, 376, 24);\n    cx.fillStyle = '#66e5ff';\n    cx.font = '500 12px \"JetBrains Mono\", monospace';\n    cx.textBaseline = 'middle';\n    cx.fillText(label, 14, 16);\n    cx.fillStyle = '#8590a0';\n    cx.font = '400 11px \"JetBrains Mono\", monospace';\n    ['> reading sensor[3]', '> drift = 0.0021 °C', '> within tolerance ✓', '> next cycle: 04:12']\n      .forEach((ln, li) => cx.fillText(ln, 14, 50 + li * 16));\n\n    const tex = new THREE.CanvasTexture(cv);\n    tex.anisotropy = 8;\n    const p = new THREE.Mesh(\n      new THREE.PlaneGeometry(1.5, 0.5),\n      tagOpacity(new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide }), 0.8)\n    );\n    const a = (i / panelLabels.length) * Math.PI * 2 + Math.PI / 4;\n    p.userData = { angle: a, r: 2.2, baseY: (i - 1) * 0.55 };\n    p.position.set(Math.cos(a) * p.userData.r, p.userData.baseY, Math.sin(a) * p.userData.r);\n    p.lookAt(0, p.position.y, 0);\n    panels.add(p);\n  });\n  g.add(panels);\n\n  return {\n    group: g,\n    update: (t) => {\n      g.rotation.y = t * 0.06;\n      cyl.rotation.y = -t * 0.25;\n      gauges.children.forEach((r, i) => {\n        r.position.y = r.userData.baseY + Math.sin(t * 0.5 + i) * 0.025;\n        r.rotation.z = t * (0.1 + i * 0.03);\n      });\n      panels.children.forEach((p, i) => {\n        p.position.y = p.userData.baseY + Math.sin(t * 0.3 + i) * 0.06;\n      });\n    }\n  };\n}\n\n/* ---------- 3 · MUST — wireframe globe + arcs ---------- */\nfunction buildGlobe() {\n  const g = new THREE.Group();\n\n  const globe = new THREE.LineSegments(\n    new THREE.WireframeGeometry(new THREE.SphereGeometry(1.4, 22, 16)),\n    tagOpacity(new THREE.LineBasicMaterial({ color: 0xffb547 }), 0.35)\n  );\n  g.add(globe);\n\n  const globeFill = new THREE.Mesh(\n    new THREE.SphereGeometry(1.36, 32, 24),\n    tagOpacity(new THREE.MeshPhysicalMaterial({\n      color: 0xffb547, transmission: 0.5, thickness: 0.5, roughness: 0.3,\n    }), 0.07)\n  );\n  g.add(globeFill);\n\n  const nodes = new THREE.Group();\n  const nodePositions = [];\n  for (let i = 0; i < 8; i++) {  // was 12\n    const phi = Math.acos(2 * Math.random() - 1);\n    const theta = Math.random() * Math.PI * 2;\n    const r = 1.42;\n    const pos = new THREE.Vector3(\n      r * Math.sin(phi) * Math.cos(theta),\n      r * Math.cos(phi),\n      r * Math.sin(phi) * Math.sin(theta)\n    );\n    nodePositions.push(pos);\n\n    const node = new THREE.Mesh(\n      new THREE.SphereGeometry(0.045, 12, 12),\n      tagOpacity(new THREE.MeshBasicMaterial({ color: 0xffb547 }), 1)\n    );\n    node.position.copy(pos);\n    node.userData.phase = Math.random() * Math.PI * 2;\n    nodes.add(node);\n  }\n  g.add(nodes);\n\n  const arcs = new THREE.Group();\n  for (let i = 0; i < 5; i++) {  // was 8\n    const a = nodePositions[Math.floor(Math.random() * nodePositions.length)];\n    const b = nodePositions[Math.floor(Math.random() * nodePositions.length)];\n    if (a.equals(b)) continue;\n    const mid = a.clone().add(b).multiplyScalar(0.5).normalize().multiplyScalar(2);\n    const curve = new THREE.QuadraticBezierCurve3(a, mid, b);\n    const points = curve.getPoints(36);\n    const arcGeo = new THREE.BufferGeometry().setFromPoints(points);\n    const arc = new THREE.Line(arcGeo, tagOpacity(\n      new THREE.LineBasicMaterial({ color: 0x66e5ff, blending: THREE.AdditiveBlending }), 0.5\n    ));\n    arc.userData.phase = Math.random() * Math.PI * 2;\n    arcs.add(arc);\n  }\n  g.add(arcs);\n\n  // Outer AI particles (slim ring)\n  const aiCount = Math.floor(40 * PARTICLE_FACTOR);\n  const aiGeo = new THREE.BufferGeometry();\n  const aiPos = new Float32Array(aiCount * 3);\n  const aiSeeds = [];\n  for (let i = 0; i < aiCount; i++) {\n    const r = 2.2 + Math.random() * 0.6;\n    const theta = Math.random() * Math.PI * 2;\n    const phi = Math.acos(2 * Math.random() - 1);\n    aiPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);\n    aiPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);\n    aiPos[i*3+2] = r * Math.cos(phi);\n    aiSeeds.push({ r, theta, phi, speed: 0.15 + Math.random() * 0.15 });\n  }\n  aiGeo.setAttribute('position', new THREE.BufferAttribute(aiPos, 3));\n  const aiPoints = new THREE.Points(aiGeo, tagOpacity(new THREE.PointsMaterial({\n    color: 0xffb547, size: 0.04, blending: THREE.AdditiveBlending, depthWrite: false,\n  }), 0.7));\n  aiPoints.userData.seeds = aiSeeds;\n  g.add(aiPoints);\n\n  return {\n    group: g,\n    update: (t) => {\n      g.rotation.y = t * 0.06;\n      globe.rotation.y = -t * 0.04;\n      globeFill.rotation.y = -t * 0.04;\n      nodes.children.forEach((n) => {\n        n.scale.setScalar(0.95 + Math.sin(t * 1.0 + n.userData.phase) * 0.25);\n      });\n      arcs.children.forEach((arc) => {\n        const baseO = arc.material.userData.baseOpacity;\n        // smoothed pulse\n        const pulse = 0.5 + Math.sin(t * 0.5 + arc.userData.phase) * 0.4;\n        arc.material.opacity = baseO * pulse * (setGroupOpacity._currentScale || 1);\n      });\n      const arr = aiPoints.geometry.attributes.position.array;\n      aiPoints.userData.seeds.forEach((s, i) => {\n        const theta = s.theta + t * s.speed * 0.2;\n        arr[i*3]   = s.r * Math.sin(s.phi) * Math.cos(theta);\n        arr[i*3+1] = s.r * Math.sin(s.phi) * Math.sin(theta);\n        arr[i*3+2] = s.r * Math.cos(s.phi);\n      });\n      aiPoints.geometry.attributes.position.needsUpdate = true;\n    }\n  };\n}\n\n/* ---------- 4 · LIARS BAR — distributed network ---------- */\nfunction buildNetwork() {\n  const g = new THREE.Group();\n\n  const server = new THREE.Mesh(\n    new THREE.OctahedronGeometry(0.5, 0),\n    tagOpacity(new THREE.MeshPhysicalMaterial({\n      color: 0x66e5ff, metalness: 0.3, roughness: 0.15,\n      transmission: 0.6, thickness: 0.5, ior: 1.4,\n    }), 0.85)\n  );\n  g.add(server);\n\n  const serverWire = new THREE.LineSegments(\n    new THREE.WireframeGeometry(new THREE.OctahedronGeometry(0.52, 0)),\n    tagOpacity(new THREE.LineBasicMaterial({ color: 0x66e5ff }), 0.6)\n  );\n  g.add(serverWire);\n\n  const clients = new THREE.Group();\n  const clientCount = 4;  // was 5\n  const clientPositions = [];\n  for (let i = 0; i < clientCount; i++) {\n    const angle = (i / clientCount) * Math.PI * 2;\n    const r = 2.2;\n    const pos = new THREE.Vector3(\n      Math.cos(angle) * r,\n      Math.sin(i * 1.7) * 0.4,\n      Math.sin(angle) * r\n    );\n    clientPositions.push(pos);\n\n    const client = new THREE.Mesh(\n      new THREE.IcosahedronGeometry(0.2, 0),\n      tagOpacity(new THREE.MeshPhysicalMaterial({\n        color: 0xffffff, transmission: 0.7, thickness: 0.4, roughness: 0.2,\n      }), 0.8)\n    );\n    client.position.copy(pos);\n    client.userData.angle = angle;\n    client.userData.baseY = pos.y;\n    clients.add(client);\n\n    const cw = new THREE.LineSegments(\n      new THREE.WireframeGeometry(new THREE.IcosahedronGeometry(0.22, 0)),\n      tagOpacity(new THREE.LineBasicMaterial({ color: 0xffb547 }), 0.45)\n    );\n    cw.position.copy(pos);\n    cw.userData = client.userData;\n    clients.add(cw);\n  }\n  g.add(clients);\n\n  const lines = new THREE.Group();\n  clientPositions.forEach((pos) => {\n    const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), pos.clone()]);\n    const ln = new THREE.Line(lineGeo, tagOpacity(new THREE.LineBasicMaterial({ color: 0x66e5ff }), 0.3));\n    lines.add(ln);\n  });\n  g.add(lines);\n\n  // Message packets\n  const packets = new THREE.Group();\n  for (let i = 0; i < clientCount * 2; i++) {\n    const pkt = new THREE.Mesh(\n      new THREE.SphereGeometry(0.045, 8, 8),\n      tagOpacity(new THREE.MeshBasicMaterial({ color: i % 2 === 0 ? 0x66e5ff : 0xffb547 }), 1)\n    );\n    pkt.userData.clientIdx = i % clientCount;\n    pkt.userData.t = Math.random();\n    pkt.userData.speed = 0.18 + Math.random() * 0.15;\n    pkt.userData.dir = i % 2 === 0 ? 1 : -1;\n    packets.add(pkt);\n  }\n  g.add(packets);\n\n  return {\n    group: g,\n    update: (t) => {\n      g.rotation.y = t * 0.05;\n      server.rotation.y = t * 0.35;\n      server.rotation.x = t * 0.18;\n      serverWire.rotation.y = t * 0.35;\n      serverWire.rotation.x = t * 0.18;\n\n      clients.children.forEach((c) => {\n        c.position.y = c.userData.baseY + Math.sin(t * 0.5 + c.userData.angle) * 0.08;\n      });\n\n      lines.children.forEach((ln, i) => {\n        const baseO = ln.material.userData.baseOpacity;\n        const pulse = 0.6 + Math.sin(t * 1.0 + i) * 0.4;\n        ln.material.opacity = baseO * pulse;\n      });\n\n      packets.children.forEach((pkt) => {\n        pkt.userData.t += pkt.userData.speed * 0.008;  // slowed\n        if (pkt.userData.t > 1) pkt.userData.t = 0;\n        const target = clientPositions[pkt.userData.clientIdx];\n        const tt = pkt.userData.dir > 0 ? pkt.userData.t : 1 - pkt.userData.t;\n        pkt.position.x = target.x * tt;\n        pkt.position.y = target.y * tt;\n        pkt.position.z = target.z * tt;\n      });\n    }\n  };\n}\n\n/* ---------- 5 · PROJECTS — pipeline + threads ---------- */\nfunction buildPipelineThreads() {\n  const g = new THREE.Group();\n\n  const splitter = new THREE.Mesh(\n    new THREE.OctahedronGeometry(0.35, 0),\n    tagOpacity(new THREE.MeshPhysicalMaterial({\n      color: 0xffffff, metalness: 0.4, roughness: 0.1,\n      transmission: 0.8, thickness: 0.5,\n    }), 0.85)\n  );\n  g.add(splitter);\n\n  // pipeline boxes — top\n  const pipeline = new THREE.Group();\n  pipeline.position.y = 0.9;\n  for (let i = 0; i < 5; i++) {  // was 6\n    const box = new THREE.Mesh(\n      new THREE.BoxGeometry(0.26, 0.2, 0.26),\n      tagOpacity(new THREE.MeshPhysicalMaterial({\n        color: 0xffffff, transmission: 0.5, roughness: 0.25, thickness: 0.3,\n      }), 0.7)\n    );\n    box.userData.t = i / 5;\n    box.userData.speed = 0.2;\n    pipeline.add(box);\n    const edge = new THREE.LineSegments(\n      new THREE.EdgesGeometry(box.geometry),\n      tagOpacity(new THREE.LineBasicMaterial({ color: 0x66e5ff }), 0.55)\n    );\n    box.add(edge);\n  }\n  g.add(pipeline);\n\n  // thread streams — bottom\n  const threads = new THREE.Group();\n  threads.position.y = -0.9;\n\n  const gate = new THREE.Mesh(\n    new THREE.BoxGeometry(0.04, 1.0, 0.3),\n    tagOpacity(new THREE.MeshBasicMaterial({ color: 0xffb547 }), 0.7)\n  );\n  threads.add(gate);\n\n  const streamCount = 10;  // was 14\n  const stream1 = new THREE.Group();\n  const stream2 = new THREE.Group();\n  for (let i = 0; i < streamCount; i++) {\n    const p1 = new THREE.Mesh(\n      new THREE.SphereGeometry(0.05, 8, 8),\n      tagOpacity(new THREE.MeshBasicMaterial({ color: 0x66e5ff }), 1)\n    );\n    p1.userData.t = i / streamCount;\n    p1.userData.speed = 0.15 + Math.random() * 0.04;\n    stream1.add(p1);\n\n    const p2 = new THREE.Mesh(\n      new THREE.SphereGeometry(0.05, 8, 8),\n      tagOpacity(new THREE.MeshBasicMaterial({ color: 0xffb547 }), 1)\n    );\n    p2.userData.t = i / streamCount;\n    p2.userData.speed = 0.15 + Math.random() * 0.04;\n    stream2.add(p2);\n  }\n  threads.add(stream1);\n  threads.add(stream2);\n\n  const railMat = tagOpacity(new THREE.LineBasicMaterial({ color: 0xffffff }), 0.12);\n  const rail1 = new THREE.Line(\n    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-1.4, 0.35, 0), new THREE.Vector3(1.4, 0.35, 0)]),\n    railMat.clone()\n  );\n  const rail2 = new THREE.Line(\n    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-1.4, -0.35, 0), new THREE.Vector3(1.4, -0.35, 0)]),\n    railMat.clone()\n  );\n  threads.add(rail1);\n  threads.add(rail2);\n  g.add(threads);\n\n  return {\n    group: g,\n    update: (t) => {\n      g.rotation.y = Math.sin(t * 0.1) * 0.1;\n      splitter.rotation.y = t * 0.3;\n      splitter.rotation.x = t * 0.18;\n\n      pipeline.children.forEach((b) => {\n        b.userData.t += b.userData.speed * 0.003;  // slower\n        if (b.userData.t > 1) b.userData.t = 0;\n        b.position.x = -1.4 + b.userData.t * 2.8;\n        b.position.y = Math.sin(b.userData.t * Math.PI * 2) * 0.05;\n        b.rotation.y = t * 0.3 + b.userData.t * 4;\n      });\n\n      stream1.children.forEach((p) => {\n        p.userData.t += p.userData.speed * 0.003;\n        if (p.userData.t > 1) p.userData.t = 0;\n        p.position.x = -1.4 + p.userData.t * 2.8;\n        const conv = Math.max(0, p.userData.t - 0.45) * 1.6;\n        p.position.y = 0.35 - conv;\n      });\n      stream2.children.forEach((p) => {\n        p.userData.t += p.userData.speed * 0.003;\n        if (p.userData.t > 1) p.userData.t = 0;\n        p.position.x = -1.4 + p.userData.t * 2.8;\n        const conv = Math.max(0, p.userData.t - 0.45) * 1.6;\n        p.position.y = -0.35 + conv;\n      });\n\n      const baseO = gate.material.userData.baseOpacity;\n      gate.material.opacity = baseO * (0.7 + Math.sin(t * 1.6) * 0.2);\n    }\n  };\n}\n\n/* ---------- 6 · SKILLS — floating code panels ---------- */\nfunction buildSkillPanels() n.y = p.userData.baseY + Math.sin(t * 0.4 + p.userData.phase) * 0.08;\n        p.lookAt(camera.position);\n      });\n    }\n  };\n}\n\n/* ---------- 7 · CAPABILITIES — torus knot ---------- */\nfunction buildCapabilities() {\n  const g = new THREE.Group();\n\n  const center = new THREE.Mesh(\n    new THREE.TorusKnotGeometry(0.7, 0.15, 100, 16),\n    tagOpacity(new THREE.MeshPhysicalMaterial({\n      color: 0xffffff, metalness: 0.25, roughness: 0.15,\n      transmission: 0.6, thickness: 0.4,\n    }), 0.65)\n  );\n  g.add(center);\n\n  const wire = new THREE.LineSegments(\n    new THREE.WireframeGeometry(new THREE.TorusKnotGeometry(0.72, 0.16, 100, 16)),\n    tagOpacity(new THREE.LineBasicMaterial({ color: 0x66e5ff }), 0.35)\n  );\n  g.add(wire);\n\n  const dots = new THREE.Group();\n  for (let i = 0; i < 5; i++) {  // was 6\n    const d = new THREE.Mesh(\n      new THREE.SphereGeometry(0.05, 12, 12),\n      tagOpacity(new THREE.MeshBasicMaterial({ color: 0x66e5ff }), 1)\n    );\n    d.userData.angle = (i / 5) * Math.PI * 2;\n    d.userData.r = 2;\n    dots.add(d);\n  }\n  g.add(dots);\n\n  return {\n    group: g,\n    update: (t) => {\n      g.rotation.y = t * 0.08;\n      g.rotation.x = Math.sin(t * 0.2) * 0.1;\n      center.rotation.y = t * 0.18;\n      wire.rotation.y = t * 0.18;\n      dots.children.forEach((d) => {\n        const a = d.userData.angle + t * 0.25;\n        d.position.x = Math.cos(a) * d.userData.r;\n        d.position.z = Math.sin(a) * d.userData.r;\n        d.position.y = Math.sin(t * 0.5 + d.userData.angle) * 0.4;\n      });\n    }\n  };\n}\n\n/* ---------- 8 · GOALS — three rising spires ---------- */\nfunction buildGoals() {\n  const g = new THREE.Group();\n\n  const spires = [];\n  for (let i = 0; i < 3; i++) {\n    const sp = new THREE.Mesh(\n      new THREE.ConeGeometry(0.16, 1.3, 6),\n      tagOpacity(new THREE.MeshPhysicalMaterial({\n        color: 0xffb547, metalness: 0.3, roughness: 0.2,\n        transmission: 0.4, thickness: 0.4,\n      }), 0.85)\n    );\n    sp.position.x = (i - 1) * 1.2;\n    sp.userData.phase = i * 0.7;\n    spires.push(sp);\n    g.add(sp);\n\n    const wire = new THREE.LineSegments(\n      new THREE.WireframeGeometry(new THREE.ConeGeometry(0.17, 1.3, 6)),\n      tagOpacity(new THREE.LineBasicMaterial({ color: 0xffb547 }), 0.45)\n    );\n    wire.position.copy(sp.position);\n    wire.userData = sp.userData;\n    g.add(wire);\n    spires.push(wire);\n  }\n\n  const ring = new THREE.Mesh(\n    new THREE.TorusGeometry(2, 0.006, 16, 160),\n    tagOpacity(new THREE.MeshBasicMaterial({ color: 0xffb547 }), 0.25)\n  );\n  ring.rotation.x = Math.PI / 2;\n  ring.position.y = -0.75;\n  g.add(ring);\n\n  return {\n    group: g,\n    update: (t) => {\n      g.rotation.y = Math.sin(t * 0.15) * 0.15;\n      spires.forEach((s) => {\n        s.position.y = Math.sin(t * 0.4 + s.userData.phase) * 0.1;\n        s.rotation.y = t * 0.18 + s.userData.phase;\n      });\n    }\n  };\n}\n\n/* ---------- 9 · CONTACT — final identity card ---------- */\nfunction buildContact() {\n  const g = new THREE.Group();\n\n  const cv = document.createElement('canvas');\n  cv.width = 768; cv.height = 432;\n  const cx = cv.getContext('2d');\n  const grad = cx.createLinearGradient(0, 0, 768, 432);\n  grad.addColorStop(0, 'rgba(10,14,21,0.95)');\n  grad.addColorStop(1, 'rgba(6,8,12,0.95)');\n  cx.fillStyle = grad;\n  cx.fillRect(0, 0, 768, 432);\n  cx.strokeStyle = '#66e5ff';\n  cx.lineWidth = 2;\n  cx.strokeRect(12, 12, 744, 408);\n  cx.lineWidth = 2;\n  [[40,40],[728,40],[40,392],[728,392]].forEach(([x,y]) => {\n    cx.beginPath(); cx.moveTo(x-12,y); cx.lineTo(x+12,y); cx.moveTo(x,y-12); cx.lineTo(x,y+12); cx.stroke();\n  });\n  cx.fillStyle = '#eef1f5';\n  cx.font = '300 80px \"Fraunces\", serif';\n  cx.textBaseline = 'top';\n  cx.fillText('Nicolò', 60, 120);\n  cx.font = 'italic 300 80px \"Fraunces\", serif';\n  cx.fillStyle = '#66e5ff';\n  cx.fillText('Shuai.', 60, 200);\n  cx.fillStyle = '#8590a0';\n  cx.font = '500 18px \"JetBrains Mono\", monospace';\n  cx.fillText('CS · C# / C++ / Go · DISTRIBUTED SYSTEMS', 60, 320);\n  cx.fillStyle = '#66e5ff';\n  cx.fillText('AVAILABLE · 2026', 60, 350);\n\n  const tex = new THREE.CanvasTexture(cv);\n  tex.anisotropy = 8;\n  const card = new THREE.Mesh(\n    new THREE.PlaneGeometry(3, 1.69),\n    tagOpacity(new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide }), 0.85)\n  );\n  // push back so text in front always wins\n  card.position.z = -1.5;\n  g.add(card);\n\n  const ring = new THREE.Mesh(\n    new THREE.TorusGeometry(2.1, 0.006, 16, 200),\n    tagOpacity(new THREE.MeshBasicMaterial({ color: 0x66e5ff }), 0.45)\n  );\n  ring.position.z = -1.7;\n  g.add(ring);\n\n  const ring2 = new THREE.Mesh(\n    new THREE.TorusGeometry(2.5, 0.004, 16, 200),\n    tagOpacity(new THREE.MeshBasicMaterial({ color: 0xffb547 }), 0.3)\n  );\n  ring2.rotation.z = Math.PI / 4;\n  ring2.position.z = -1.9;\n  g.add(ring2);\n\n  return {\n    group: g,\n    update: (t) => {\n      g.rotation.y = Math.sin(t * 0.2) * 0.1 + M.mx * 0.08;\n      g.rotation.x = Math.sin(t * 0.3) * 0.04 - M.my * 0.06;\n      ring.rotation.z = t * 0.1;\n      ring2.rotation.z = -t * 0.08;\n    }\n  };\n}\n\n// ============================================================\n// BUILD ALL SCENES\n// ============================================================\nconst sceneBuilders = [\n  buildHero,         // 0\n  buildLanguages,    // 1\n  buildIndustrial,   // 2\n  buildGlobe,        // 3\n  buildNetwork,      // 4\n  buildPipelineThreads, // 5\n  buildSkillPanels,  // 6\n  buildCapabilities, // 7\n  buildGoals,        // 8\n  buildContact,      // 9\n];\n\nconst scenes = [];\nsceneBuilders.forEach((b) => {\n  const s = b();\n  setGroupOpacity(s.group, 0);\n  s.opacity = 0;        // current opacity (lerped)\n  s.opacityT = 0;       // target opacity (set by scrub timeline)\n  scene.add(s.group);\n  scenes.push(s);\n});\n\n// First scene visible\nscenes[0].opacityT = 1;\n\n// ============================================================\n// CONTINUOUS SCROLL TIMELINE — single timeline driven by overall scroll\n// progress. We drive a \"progress\" value 0..1 mapped over the full page,\n// and each scene's opacityT and the camera/zone targets are functions\n// of that progress, with cosine-easing ramps for cinematic crossfades.\n// ============================================================\nconst sectionEls = gsap.utils.toArray('section[data-step]');\nconst N = sectionEls.length; // 10\n\n// Master progress ticker — uses ScrollTrigger.scrub for buttery smoothness.\n// We don't tween properties inside; instead we read M_progress every frame\n// in the render loop and compute opacities. This keeps a single source of\n// truth and avoids competing tweens.\nconst Master = { progress: 0 };\n\nScrollTrigger.create({\n  trigger: 'main',\n  start: 'top top',\n  end: 'bottom bottom',\n  scrub: 1.4, // smooth scrub — adds inertia to scroll mapping\n  onUpdate: (self) => {\n    // tweening-inertia doesn't apply to scrub; we instead just store progress\n    Master.progress = self.progress;\n  }\n});\n\n// Section-anchored triggers — used only for: progress dot highlight,\n// camera zone target, and stage-mask target. Easing of those values\n// happens via M.* lerps in the render loop.\nconst zoneMap = {\n  'center': 0,\n  'right':  -0.55,  // 3D group sits to the LEFT of center, offset negative — wait, careful\n  'left':   0.55,   // 3D group sits to the RIGHT of center\n};\n// Convention: data-zone = where the 3D BUBBLE goes.\n// \"right\" means content-LEFT, 3D-RIGHT  → group.position.x = +offset\n// \"left\" means content-RIGHT, 3D-LEFT  → group.position.x = -offset\nconst zoneOffset = (z) => z === 'right' ? 1 : z === 'left' ? -1 : 0;\n\nconst camTarget = { x: 0, y: 0, z: 10 };\n\n// active scene index (which scene should be at full opacity NOW)\nlet activeIdx = 0;\n\nsectionEls.forEach((sec, i) => {\n  const zone = sec.dataset.zone || 'center';\n  ScrollTrigger.create({\n    trigger: sec,\n    start: 'top 70%',\n    end: 'bottom 30%',\n    onEnter: () => onSection(i, zone),\n    onEnterBack: () => onSection(i, zone),\n  });\n});\n\nfunction onSection(i, zone) {\n  activeIdx = i;\n  // smoothly target the zone\n  const target = zoneOffset(zone);\n  gsap.to(M, { zoneT: target, duration: 1.6, ease: 'expo.out', overwrite: 'auto' });\n\n  // every scene fades — current scene opacityT=1, others 0\n  scenes.forEach((s, idx) => {\n    s.opacityT = (idx === i) ? 1 : 0;\n  });\n\n  // active progress dot\n  document.querySelectorAll('.progress-item').forEach(el => el.classList.toggle('active', +el.dataset.i === i));\n\n  // mask side\n  const maskL = document.getElementById('mask-left');\n  const maskR = document.getElementById('mask-right');\n  const maskC = document.getElementById('mask-center');\n  // when 3D is on RIGHT (zone 'right'), dim the LEFT to make text pop? No —\n  // we want the text side BRIGHT, the 3D side natural, and a mask on the\n  // text side to ensure 3D never overlaps. We dim the OPPOSITE side to\n  // soften the 3D edge bleeding into text.\n  if (zone === 'right') {\n    // 3D on right → put a soft mask on the LEFT (text side) to absorb stray particles\n    maskL.style.opacity = '0.85';\n    maskR.style.opacity = '0';\n    maskC.style.opacity = '0';\n  } else if (zone === 'left') {\n    maskL.style.opacity = '0';\n    maskR.style.opacity = '0.85';\n    maskC.style.opacity = '0';\n  } else {\n    maskL.style.opacity = '0';\n    maskR.style.opacity = '0';\n    maskC.style.opacity = '0.5';\n  }\n}\n\n// ============================================================\n// FADE-UP REVEALS — staggered, gentle\n// ============================================================\ngsap.utils.toArray('.fade-up').forEach((el, i) => {\n  gsap.to(el, {\n    opacity: 1,\n    y: 0,\n    duration: 1.2,\n    ease: 'power3.out',\n    scrollTrigger: { trigger: el, start: 'top 88%' }\n  });\n});\n\n// progress click-to-scroll\ndocument.querySelectorAll('.progress-item').forEach(el => {\n  el.addEventListener('click', () => {\n    const i = +el.dataset.i;\n    if (sectionEls[i]) sectionEls[i].scrollIntoView({ behavior: 'smooth' });\n  });\n});\n\n// ============================================================\n// RENDER LOOP — single source of all per-frame motion\n// All animation here uses lerp() for inertia.\n// ============================================================\nconst clock = new THREE.Clock();\n\nfunction tick() {\n  const t = clock.getElapsedTime();\n\n  // --- damped mouse (slow, smooth) ---\n  M.mx = lerp(M.mx, M.mxT, 0.035);\n  M.my = lerp(M.my, M.myT, 0.035);\n\n  // --- damped zone position ---\n  M.zone = lerp(M.zone, M.zoneT, 0.06);\n\n  // --- damped scene opacities (cinematic crossfade) ---\n  scenes.forEach((s) => {\n    s.opacity = lerp(s.opacity, s.opacityT, 0.04); // slow fade ~ 1.5s feel\n    if (s.opacity > 0.005) {\n      setGroupOpacity(s.group, s.opacity);\n    } else {\n      setGroupOpacity(s.group, 0);\n    }\n  });\n\n  // --- per-scene update — only update visible scenes ---\n  scenes.forEach((s) => {\n    if (s.opacity > 0.01) s.update(t);\n  });\n\n  // --- group offset: place each scene on its assigned side ---\n  // The group offset is shared (we move ALL scenes together). The active\n  // scene wins because others are at opacity ~0.\n  // Convert M.zone (-1..+1) into a world-space x offset based on viewport.\n  const offsetMagnitude = 2.6;  // units in 3D world\n  const offsetX = M.zone * offsetMagnitude;\n  scenes.forEach((s) => {\n    // each scene group shares this offset\n    s.group.position.x = offsetX + M.mx * 0.18;\n    s.group.position.y = -M.my * 0.14;\n  });\n\n  // --- ambient particles drift slowly ---\n  ambientParticles.rotation.y = t * 0.008 + M.mx * 0.025;\n  ambientParticles.rotation.x = M.my * 0.02;\n\n  // --- camera: very gentle parallax only (no big movement on scroll) ---\n  camera.position.x = lerp(camera.position.x, M.mx * 0.25, 0.04);\n  camera.position.y = lerp(camera.position.y, -M.my * 0.18, 0.04);\n  camera.lookAt(0, 0, 0);\n\n  renderer.render(scene, camera);\n  requestAnimationFrame(tick);\n}\ntick();\n\n// ============================================================\n// RESIZE — refresh ScrollTrigger after layout settles\n// ============================================================\nlet resizeRAF;\nwindow.addEventListener('resize', () => {\n  cancelAnimationFrame(resizeRAF);\n  resizeRAF = requestAnimationFrame(() => {\n    camera.aspect = innerWidth / innerHeight;\n    camera.updateProjectionMatrix();\n    renderer.setSize(innerWidth, innerHeight);\n    ScrollTrigger.refresh();\n  });\n});\n\n// Refresh once after fonts/3D textures load (canvas textures generated synchronously,\n// but fonts may shift layout; this ensures triggers are positioned correctly)\nwindow.addEventListener('load', () => {\n  setTimeout(() => ScrollTrigger.refresh(), 100);\n});\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
